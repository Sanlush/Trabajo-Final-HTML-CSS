<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/login.css">
    <title>Inicio de Sesión</title>
</head>
<body>
    <div class="main__wrapper">
        <main class="main">
            <div class="container__articles">
                <div class="container__login">
                    <div class="container__img-logo">
                        <img src="/assets/images/logos/Logo-de-la-web.png" alt="Logo de la Pagina Web">
                    </div>
                    <div class="login">
                        <div class="container__login-alt">
                            <h1>Iniciar Sesión</h1>
                            <span>Inicia Sesión o Crea una Cuenta</span>
                            <a href="#">Continuar con Shop</a>
                        </div>
                        <span>o Tal vez</span>
                        <div class="container__login-email">
                            <form>
                                <input type="email" placeholder="Email">
                                <button type="submit">Continuar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer">
            <div class="footer-info">
                <div class="container__copyright">
                    <span>© 2026, <a href="index.html">Ropa de Suministro Carmesí</a></span>
                </div>
                <div class="container__info">
                    <ul>
                        <li><a href="#">Politica de Privacidad</a></li>
                        <li><a href="#">Politica de Compra</a></li>
                        <li><a href="#">Informacion de Contacto</a></li>
                        <li><a href="#">Terminos del Servicio</a></li>
                        <li><a href="#">Politica de Devolución</a></li>
                        <li><a href="#">Preferencia de Cookies</a></li>
                    </ul>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
